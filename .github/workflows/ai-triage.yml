name: AI Abuse Triage

# Every 30 minutes: pulls pending abuse reports from the production Nexus
# server's admin API, asks Claude to classify each, auto-resolves the
# unambiguous false-positives, and opens GitHub issues for the rest so a
# human reviews before any ban is issued.
#
# DELIBERATE SAFETY MARGIN:
#   - Never auto-bans anyone. Bans are always human-issued.
#   - Only auto-resolves reports the model marks "false_positive" with
#     confidence >= 0.85. Everything else escalates.
#   - All actions are logged in the issue body so you can audit the loop.
#
# Required secrets:
#   GOOGLE_API_KEY         — Google AI Studio key (free: aistudio.google.com)
#   NEXUS_ADMIN_TOKEN      — bearer token from an admin's session_auth
#   NEXUS_BASE_URL         — e.g. https://phazechat.world

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: ai-triage
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/ai_triage/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/ai_triage/requirements.txt

      - name: Run triage
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NEXUS_ADMIN_TOKEN: ${{ secrets.NEXUS_ADMIN_TOKEN }}
          NEXUS_BASE_URL: ${{ secrets.NEXUS_BASE_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: python scripts/ai_triage/triage.py
