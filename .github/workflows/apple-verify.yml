name: Sovereign Apple Verification

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  verify-macos:
    name: Native macOS build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Build native macOS binary (full module)
        run: |
          go work sync
          cd native_client
          go build -v -o Phaze .

  verify-ios:
    name: iOS Simulator package (Fyne)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Install Fyne CLI (mobile packaging)
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Build iOS Simulator bundle
        run: |
          cd native_client
          fyne package -os iossimulator --src . --id world.phazechat.app --name Phaze
