name: Release

on:
  push:
    tags:
      - 'v*'
      - 'beta*'
  release:
    types: [published, prereleased]

permissions:
  contents: write

jobs:
  # One GoReleaser run (was three parallel jobs each calling `release --clean`, which races).
  goreleaser:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Linux desktop + Windows cross build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev xorg-dev libxkbcommon-dev libasound2-dev libpulse-dev \
            gcc-mingw-w64-x86-64 \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Fyne + CGO desktop client for macOS (not built in the Linux GoReleaser job).
  macos-phaze:
    needs: [goreleaser]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Phaze for macOS
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p staging-amd64 staging-arm64
          cd native_client
          go mod download
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 go build -ldflags="-s -w -X main.version=${TAG}" -o ../staging-amd64/phaze .
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build -ldflags="-s -w -X main.version=${TAG}" -o ../staging-arm64/phaze .
          cd ..
          chmod +x staging-amd64/phaze staging-arm64/phaze
          tar -czvf Phaze-macos-amd64.tar.gz -C staging-amd64 phaze
          tar -czvf Phaze-macos-arm64.tar.gz -C staging-arm64 phaze

      - name: Upload macOS archives to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" Phaze-macos-amd64.tar.gz Phaze-macos-arm64.tar.gz --clobber

  # Android APK is built with fyne package (NDK); uploaded as Phaze.apk for stable latest URL.
  android-apk:
    needs: [goreleaser]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Android SDK + NDK and build APK
        env:
          ANDROID_HOME: ${{ github.workspace }}/android-sdk
        run: |
          set -euo pipefail
          mkdir -p "$ANDROID_HOME"
          bash scripts/install-android-ndk.sh
          SM="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SM" --sdk_root="$ANDROID_HOME" --licenses >/dev/null 2>&1 || true
          "$SM" --sdk_root="$ANDROID_HOME" "platforms;android-34" "build-tools;34.0.0"
          go install fyne.io/tools/cmd/fyne@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          make android
          cp bin/Phaze-android-arm64.apk Phaze.apk

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" Phaze.apk --clobber
