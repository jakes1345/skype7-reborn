name: AI Maintenance

# Daily AI-driven maintenance: triages open issues, opens PRs for trivial
# cleanups (lint, dead code, doc drift), and runs the tests before each
# commit. PRs land with the `ai-maintenance` label so a human reviews
# before merge.
#
# Required secrets:
#   ANTHROPIC_API_KEY — your Anthropic API key (https://console.anthropic.com)
#
# Trigger surface:
#   - daily cron (06:13 UTC, off-peak to avoid Anthropic API rate spikes)
#   - manual via the Actions tab → "Run workflow"
on:
  schedule:
    - cron: '13 6 * * *'
  workflow_dispatch:
    inputs:
      focus:
        description: 'Optional focus hint (e.g. "audit nexus_server for unused vars")'
        required: false
        type: string

# Single-flight: never run two of these at once on the same branch.
concurrency:
  group: ai-maintenance
  cancel-in-progress: false

permissions:
  contents: write       # create branches
  pull-requests: write  # open PRs
  issues: write         # post triage comments

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so AI can read git log

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: nexus_server/go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Linux build deps (so tests can run)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libasound2-dev libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev libxkbcommon-dev libpulse-dev

      # The official Anthropic action runs Claude Code with bash + edit
      # tooling inside the runner. We constrain it via the prompt + a
      # tight time budget rather than tool-allowlists so it can still
      # commit and push.
      - name: Run Claude maintenance pass
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The base action defaults to claude-sonnet-4 family — fast,
          # cost-efficient. Bump to opus only if you need bigger jobs.
          model: claude-sonnet-4-6
          max_turns: 40
          allowed_tools: 'Bash,Read,Write,Edit,Glob,Grep'
          prompt: |
            You are Phaze's nightly maintenance agent. Operate on the
            current checkout of this repo.

            Scope strictly to LOW-RISK changes:
              - Dependabot PRs that already exist: read the diff, run the
                full test suite, comment your verdict ("LGTM ✅" / "DO NOT
                MERGE: <reason>") on each.
              - Dead-code removal where `go vet` / TypeScript reports it.
              - Doc drift (commands in README that no longer work, broken
                relative links).
              - Trivial lint fixes (gofmt, eslint --fix output) that the
                Go/Node toolchain produces on its own.

            DO NOT:
              - Introduce new features.
              - Change public API or message types.
              - Edit auth, crypto, or DB schema code.
              - Touch /nexus_server/main.go switch cases for WS messages.

            For each batch of changes you want to commit:
              1. Create a feature branch `ai/maintenance-<short-slug>`.
              2. Run the relevant test suite:
                   cd nexus_server && go test -race -count=1 ./...
                   cd native_client && go test ./...
                   cd web && npm ci && npm run lint && npm test
              3. ONLY if all tests pass, commit and push.
              4. Open a PR with title `chore: ai maintenance — <slug>`
                 and label `ai-maintenance`.
              5. Body must include: what changed, what tests ran, what
                 risk level you assessed.

            If you find anything HIGH-RISK (security issue, broken
            feature, suspicious recent diff), do NOT fix it. Open a
            GitHub issue with label `ai-flagged` describing the finding
            and pointing at the file:line.

            Focus hint (may be empty): ${{ inputs.focus }}

            Time budget: 25 minutes. Stop cleanly before the runner kills
            the job. Report what you did and didn't get to in your final
            message.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
