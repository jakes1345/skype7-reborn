name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev libasound2-dev libpulse-dev
      - name: Build
        run: |
          go build ./native_client/...
          go build ./nexus_server/...
      - name: Test
        run: go test ./native_client/... ./nexus_server/...
