name: TAZHER CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libasound2-dev libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev libxkbcommon-dev libpulse-dev

      - name: Build TAZHER Engine
        run: |
          go build ./native_client
          go build ./nexus_server

      #- name: Test TAZHER Suite
      #  run: go test -v ./native_client/... ./nexus_server/...

