name: Phaze CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libasound2-dev libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev libxkbcommon-dev libpulse-dev

      - name: Build Phaze (native + nexus)
        run: |
          go work sync
          go build -o phaze-native-linux ./native_client
          go build -o phaze-nexus-linux ./nexus_server

      - name: Test Go suites
        run: |
          cd native_client && go test -v ./internal/...
          cd ../nexus_server && go test -race -count=1 -v ./...

      - name: Go vet (native + nexus)
        run: |
          cd native_client && go vet ./...
          cd ../nexus_server && go vet ./...

      - name: Install and build web client
        run: |
          cd web && npm ci && npm run build && npm run test && npm run lint

