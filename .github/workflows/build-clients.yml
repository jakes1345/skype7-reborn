# Cross-compile Phaze client packages (Fyne) for common desktop and mobile targets.
#
# - Ubuntu: fyne-io/fyne-cross inside Docker (Linux, Windows, Android; FreeBSD/Web best-effort).
# - macOS: fyne CLI native packaging (no Docker). iOS is best-effort (signing / Xcode limits).
#
# Artifacts: Actions → this workflow → latest run → Artifacts.

name: Build Client Packages

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'native_client/**'
      - '.github/workflows/build-clients.yml'
      - 'go.work'
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read

concurrency:
  group: build-clients-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fyne-cross-docker:
    name: fyne-cross (Linux, Windows, Android, FreeBSD, Web)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: native_client/go.sum

      - name: Cache fyne-cross Docker layers
        uses: actions/cache@v4
        with:
          path: ~/.cache/fyne-cross
          key: fyne-cross-cache-${{ runner.os }}-${{ hashFiles('native_client/go.sum') }}

      - name: Install fyne tooling
        run: |
          go install github.com/fyne-io/fyne-cross@latest
          go install fyne.io/fyne/v2/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Docker engine
        run: docker version

      - name: Linux (amd64, arm64)
        working-directory: native_client
        run: fyne-cross linux --arch amd64,arm64 --pull -app-id world.phazechat.app

      - name: Windows (amd64)
        working-directory: native_client
        run: fyne-cross windows --arch amd64 --pull -app-id world.phazechat.app

      - name: Android (arm64 APK)
        working-directory: native_client
        run: fyne-cross android --arch arm64 --pull -app-id world.phazechat.app -icon assets/Icon.png

      - name: FreeBSD (amd64)
        continue-on-error: true
        working-directory: native_client
        run: fyne-cross freebsd --arch amd64 --pull -app-id world.phazechat.app

      - name: Web (WASM bundle)
        continue-on-error: true
        working-directory: native_client
        run: fyne-cross web --pull -app-id world.phazechat.app

      - name: Upload fyne-cross output
        uses: actions/upload-artifact@v4
        with:
          name: phaze-client-linux-windows-android-freebsd-web-${{ github.sha }}
          path: |
            native_client/fyne-cross/
          retention-days: 21
          if-no-files-found: warn

  fyne-package-macos:
    name: fyne package (macOS + iOS best-effort)
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: native_client/go.sum

      - name: Install build deps and fyne CLI
        run: |
          brew install libvpx pkg-config
          go install fyne.io/fyne/v2/cmd/fyne@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Package macOS release bundle
        working-directory: native_client
        run: fyne package -os darwin -release -app-id world.phazechat.app

      - name: Package iOS (best effort)
        continue-on-error: true
        working-directory: native_client
        run: fyne package -os ios -release -app-id world.phazechat.app

      - name: List outputs
        working-directory: native_client
        run: ls -la

      - name: Upload macOS / iOS outputs
        uses: actions/upload-artifact@v4
        with:
          name: phaze-client-macos-ios-${{ github.sha }}
          path: |
            native_client/Phaze.app
            native_client/*.ipa
            native_client/*.zip
            native_client/*.tar.xz
          retention-days: 21
          if-no-files-found: warn
