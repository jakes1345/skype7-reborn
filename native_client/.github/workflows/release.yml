name: TAZHER Build & Release

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_linux_windows:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [linux, windows]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libasound2-dev libxcursor-dev libxinerama-dev libxi-dev libxrandr-dev gcc-mingw-w64

      - name: Build Binary
        run: |
          go work sync
          if [ "${{ matrix.target }}" == "windows" ]; then
            GOOS=windows GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc go build -ldflags="-H windowsgui" -o tazher-windows.exe ./native_client
          else
            GOOS=linux GOARCH=amd64 go build -o tazher-linux ./native_client
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tazher-${{ matrix.target }}
          path: tazher-*

  build_macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Build Binary
        run: |
          go work sync
          GOOS=darwin GOARCH=amd64 go build -o tazher-macos ./native_client
          GOOS=darwin GOARCH=arm64 go build -o tazher-macos-arm64 ./native_client

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tazher-macos
          path: tazher-macos*

