<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAZHER — Sovereign Mesh Communication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00aff0;
            --primary-dark: #0078d4;
            --bg: #0a0c10;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at center, rgba(0, 175, 240, 0.15) 0%, transparent 70%);
        }

        .hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('/public/img/hero.png') center/cover no-repeat;
            opacity: 0.4;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff 30%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #aaa;
            margin-bottom: 40px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 175, 240, 0.2);
        }

        .btn span { font-weight: 600; font-size: 1.1rem; }
        .btn small { font-size: 0.8rem; color: #777; margin-top: 4px; }

        .stats-bar {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            background: rgba(0,0,0,0.5);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-item { text-align: center; }
        .stat-val { display: block; font-weight: 800; color: var(--primary); font-size: 1.2rem; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #666; }

        .version-badge {
            background: var(--primary);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            vertical-align: middle;
            margin-left: 10px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .live-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    
    <section class="hero">
        <div class="container">
            <div class="glass-card">
                <div style="margin-bottom: 20px;">
                    <span class="live-dot"></span>
                    <span style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #00ff00;">Network Phase: ACTIVE</span>
                </div>
                <h1>TAZHER <span class="version-badge">v1.25.0</span></h1>
                <p class="subtitle">Sovereign Mesh Communication. 100% Go. Total Privacy. Reimagined Forensic Reconstruction of the 7.41 Engine.</p>
                
                <div class="download-grid">
                    <a href="https://github.com/jakes1345/skype7-reborn/releases/latest" class="btn">
                        <span>Windows</span>
                        <small>x64 Stable</small>
                    </a>
                    <a href="https://github.com/jakes1345/skype7-reborn/releases/latest" class="btn">
                        <span>Linux</span>
                        <small>AppImage / Binary</small>
                    </a>
                    <a href="https://github.com/jakes1345/skype7-reborn/releases/latest" class="btn">
                        <span>macOS</span>
                        <small>Intel & Apple Silicon</small>
                    </a>
                </div>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-val" id="node-count">...</span>
                <span class="stat-label">Sovereign Nodes</span>
            </div>
            <div class="stat-item">
                <span class="stat-val">P2P</span>
                <span class="stat-label">Network Type</span>
            </div>
            <div class="stat-item">
                <span class="stat-val">SECURE</span>
                <span class="stat-label">Relay Status</span>
            </div>
        </div>
    </section>

    <script>
        async function updateStats() {
            try {
                const resp = await fetch('/api/v1/stats');
                const data = await resp.json();
                document.getElementById('node-count').innerText = data.active_nodes;
            } catch (e) {
                console.error("Stats offline");
            }
        }
        setInterval(updateStats, 5000);
        updateStats();
    </script>
</body>
</html>
