<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAZHER - Sovereign Communication</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #00aff0 0%, #0078d4 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .download-hub {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            background: linear-gradient(to bottom, #ffffff 0%, #f0f0f0 100%);
            color: #0078d4;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 2px solid white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            background: white;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .logo img {
            width: 70px;
        }

        .orb {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
        }

        .orb-1 { top: -100px; right: -100px; }
        .orb-2 { bottom: -100px; left: -100px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="glass-panel">
        <div class="logo">
             <span style="font-size: 50px;">T</span>
        </div>
        <h1>TAZHER</h1>
        <p>Sovereign P2P Communication. Reimagined for the Mesh.</p>
        
        <div class="download-hub">
            <a href="https://github.com/jakes1345/skype7-reborn/releases/latest" class="btn">Windows</a>
            <a href="https://github.com/jakes1345/skype7-reborn/releases/latest" class="btn">Linux</a>
            <a href="https://github.com/jakes1345/skype7-reborn/releases/latest" class="btn">macOS</a>
        </div>
        
        <p style="font-size: 0.8rem; margin-top: 30px; opacity: 0.7;">
            Built with 100% Go. No tracking. No surveillance. Only the Mesh.
        </p>
    </div>
</body>
</html>
