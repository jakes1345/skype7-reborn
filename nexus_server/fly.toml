# fly.toml app configuration file generated for skype7-reborn on 2026-04-15T14:55:46-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'skype7-reborn'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/nexus.db'
  PORT = '8080'

[[mounts]]
  source = 'nexus_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '2gb'
  cpus = 2
  memory_mb = 2048
