version: 2

project_name: phazechat

# No root go.mod — we're a workspace. Run tidy in each module instead.
before:
  hooks:
    - bash -c "cd native_client && go mod tidy"
    - bash -c "cd nexus_server  && go mod tidy"

builds:
  - id: phaze
    main: ./native_client
    dir: .
    binary: phaze
    env:
      - CGO_ENABLED=1
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
    # Fyne + CGO: darwin needs a macOS builder (see .github/workflows/release.yml).
    # Windows/arm64 needs a separate cross toolchain; ship amd64 from CI.
    ignore:
      - goos: darwin
      - goos: windows
        goarch: arm64
    overrides:
      - goos: windows
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=x86_64-w64-mingw32-gcc
          - CXX=x86_64-w64-mingw32-g++
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++

  - id: phaze-nexus
    main: ./nexus_server
    dir: .
    binary: phaze-nexus
    env:
      - CGO_ENABLED=0
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    # Stable names for linux/windows → https://github.com/OWNER/REPO/releases/latest/download/Phaze_linux_amd64.tar.gz
    # Darwin archives here are Nexus-only (client built on macOS in CI).
    name_template: >-
      {{ if eq .Os "darwin" }}phaze-nexus_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ else }}Phaze_{{ .Os }}_{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE
      - native_client/assets/**/*
      - nexus_server/templates/**/*
      - nexus_server/public/**/*
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

release:
  github:
    owner: jakes1345
    name: skype7-reborn
  mode: keep-existing
  draft: false
  prerelease: auto
  header: |
    ## Phaze — {{ .Tag }}

    Phaze native client and Nexus relay server binaries.

    - **phaze**: Desktop client (Fyne / Go).
    - **phaze-nexus**: WebSocket and HTTP relay for accounts, chat, and optional PSTN/SMS hooks.
