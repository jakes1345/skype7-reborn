version: 2

project_name: phazechat

# No root go.mod — we're a workspace. Run tidy in each module instead.
before:
  hooks:
    - bash -c "cd native_client && go mod tidy"
    - bash -c "cd nexus_server  && go mod tidy"

builds:
  - id: phaze
    main: ./native_client
    dir: .
    binary: phaze
    env:
      - CGO_ENABLED=1
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: phaze-nexus
    main: ./nexus_server
    dir: .
    binary: phaze-nexus
    env:
      - CGO_ENABLED=0
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - SECURITY.md
      - docs/BETA.md
      - docs/PRE_BETA_CHECKLIST.md
      - LICENSE
      - native_client/assets/**/*
      - nexus_server/templates/**/*
      - nexus_server/public/**/*
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

release:
  github:
    owner: jakes1345
    name: skype7-reborn
  mode: keep-existing
  draft: false
  prerelease: auto
  header: |
    ## Phaze — {{ .Tag }}

    Phaze (Skype-style sovereign chat, voice, and video) and the Nexus relay.
    - **phaze**: Native Fyne desktop/mobile client (see `README.md` for platform notes).
    - **phaze-nexus**: WebSocket relay and account services.
