version: 2

project_name: shadow-reborn

# No root go.mod — we're a workspace. Run tidy in each module instead.
before:
  hooks:
    - bash -c "cd native_client && go mod tidy"
    - bash -c "cd nexus_server  && go mod tidy"

builds:
  - id: skype
    main: ./native_client
    dir: .
    binary: skype
    env:
      - CGO_ENABLED=1
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: skype-nexus
    main: ./nexus_server
    dir: .
    binary: skype-nexus
    env:
      - CGO_ENABLED=0
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - native_client/assets/**/*
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

release:
  github:
    owner: "{{ .Env.GITHUB_OWNER }}"
    name: shadow-reborn
  mode: keep-existing
  draft: false
  prerelease: auto
  header: |
    ## Shadow — {{ .Tag }}

    Download the archive for your platform below. Extract and run `skype`
    (the client) or `skype-nexus` (the relay server).
