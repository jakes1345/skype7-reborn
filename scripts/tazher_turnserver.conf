# TAZHER Sovereign CoTURN Configuration
# Optimized for WebRTC-UDP-CoTURN Handshakes

# The listening port for STUN/TURN
listening-port=3478

# The listening port for TLS (Sovereign fallback)
tls-listening-port=5349

# Identification for the mesh
realm=tazher.mesh

# Enable long-term credential mechanism (required for WebRTC)
lt-cred-mech

# Forensic Authentication Secret
# MUST MATCH TAZHER_TURN_SECRET in your Nexus environment
use-auth-secret
static-auth-secret=TAZHER_ALPHA_GHOST_741_MINT

# WebRTC Performance Tweak
fingerprint
total-quota=0
bps-capacity=0
stale-nonce=600

# Security: Prevent IP Leaking over relay
no-stdout-log
no-loopback-peers
no-multicast-peers

# Port range for UDP media streams
# MATCH THIS in your firewall (ufw allow 49152:65535/udp)
min-port=49152
max-port=65535
