# Phaze Sovereign CoTURN Configuration
# Optimized for WebRTC-UDP-CoTURN Handshakes

# The listening port for STUN/TURN
listening-port=3478

# The listening port for TLS (Sovereign fallback)
tls-listening-port=5349

# Identification for the mesh
realm=phaze.mesh

# Enable long-term credential mechanism (required for WebRTC)
lt-cred-mech

# Authentication secret shared with the Nexus server.
# Generate a fresh one per deployment:
#     openssl rand -hex 32
# Then set the SAME value as PHAZE_TURN_SECRET in the Nexus environment.
use-auth-secret
static-auth-secret=CHANGE_ME_openssl_rand_hex_32

# WebRTC Performance Tweak
fingerprint
total-quota=0
bps-capacity=0
stale-nonce=600

# Security: Prevent IP Leaking over relay
no-stdout-log
no-loopback-peers
no-multicast-peers

# Port range for UDP media streams
# MATCH THIS in your firewall (ufw allow 49152:65535/udp)
min-port=49152
max-port=65535
